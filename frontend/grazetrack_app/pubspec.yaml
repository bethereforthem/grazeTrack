name: grazetrack_app
description: "GrazeTrack - Smart Livestock Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & API calls to backend
  dio: ^5.3.3

  # State management (like a smart data store for the app)
  flutter_riverpod: ^2.4.0

  # Navigation between screens
  go_router: ^12.0.0

  # Beautiful charts for reports
  fl_chart: ^0.65.0

  # Save login token locally on device
  shared_preferences: ^2.2.0

  # Firebase — upgraded to v3.x to fix web build error (PromiseJsImpl)
  # After upgrading, run: flutterfire configure
  # to generate lib/firebase_options.dart
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Load images from internet with caching
  cached_network_image: ^3.3.0

  # Pick images from gallery or camera for marketplace listings
  image_picker: ^1.1.2

  # Upload listing images directly to Firebase Storage
  firebase_storage: ^12.3.4

  # Open phone dialer, email, browser — used for "Call Farmer" button
  url_launcher: ^6.2.0

  # Date and number formatting
  intl: ^0.18.0

  # PDF generation and printing/sharing
  pdf: ^3.10.8
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#2E7D32"
    theme_color: "#2E7D32"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
